<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Explore Careers | Carvion</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/careers.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

  <!-- NAVBAR -->
  <header class="navbar">

    <div class="nav-container">

      <!-- LOGO -->
      <div class="logo">
        <a href="index.html">
          <img src="assets/logo.png" alt="Carvion">
        </a>
      </div>

      <!-- NAV -->
      <nav class="nav-links">

        <a href="index.html">
          Home
        </a>

        <a href="community.html">
          Community
        </a>

        <a href="careers.html" class="active-link">
          Explore
        </a>

        <a href="quizzes.html">
          Quizzes
        </a>

        <a href="chat.html">
          Carvion AI
        </a>

      </nav>

      <!-- DASHBOARD BUTTON -->
      <div class="nav-actions">

        <a href="dashboard.html" class="dashboard-btn">
          My Dashboard
        </a>

      </div>

    </div>

  </header>

  <!-- PAGE -->
  <main class="careers-page">

    <div class="careers-layout">

      <!-- SIDEBAR -->
      <aside class="careers-sidebar">

        <!-- SEARCH -->
        <div class="sidebar-card">

          <h3>Search</h3>

          <input
            type="text"
            class="search-input"
            placeholder="Search careers..."
          >

        </div>

        <!-- INDUSTRIES -->
        <div class="sidebar-card">

          <h3>Industries</h3>

          <div
            class="filter-list"
            id="industryFilters"
          ></div>

        </div>

      </aside>

      <!-- CONTENT -->
      <section class="careers-content">

        <!-- HEADER -->
        <div class="careers-header">

          <h1>Explore Careers</h1>

          <p>
            Discover career opportunities that match
            your strengths, ambitions, and interests.
          </p>

        </div>

        <!-- GRID -->
        <div class="careers-grid"></div>

      </section>

    </div>

  </main>

  <!-- JS -->
  <script src="js/careers.js"></script>

</body>
</html>
